spring.application.name=photo-gallery-wizard
spring.main.web-application-type=none
spring.main.banner-mode=off
spring.config.import=optional:file:./configuration/picpeak-credentials.properties
logging.level.root=ERROR

# Step 1 — Schulfotos Setup
app.event-code=
app.event-name=

# Step 1/3 — Schulfotos Workflow Defaults
app.schulfotos.output-dir=schulfotos
app.schulfotos.base-url=https://mel-rohrer.ch/schulfotos
app.schulfotos.gallery-url=https://mel-rohrer.ch/schulfotos/?code=
app.schulfotos.default-code-count=17
app.schulfotos.code-charset=ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
app.schulfotos.qr-size=200
app.schulfotos.grid-columns=3
app.schulfotos.grid-rows=4
app.schulfotos.show-cutting-lines=true
app.schulfotos.gallery-code-label=GALERIE CODE
app.schulfotos.gallery-password-label=GALERIE PASSWORT
app.schulfotos.logo-path=configuration/logo.png
app.schulfotos.klassenfoto-folder=klassenfoto
app.schulfotos.portrait-prefix=portrait-
app.schulfotos.watermarked-suffix=-watermarked
app.schulfotos.password-length=9

# Step 5 — Resize & Watermark
app.watermark-path=configuration/watermark.png
app.resize-max-edge=1200
app.watermark-opacity=0.3
app.watermark-scale=0.4
app.jpeg-quality=0.9
app.logo-connect-timeout-ms=5000
app.logo-read-timeout-ms=10000

# Step 6 — PicPeak Upload
app.picpeak.enabled=false
app.picpeak.event-type=schulfotos
app.picpeak.expiration-days=42
app.picpeak.require-password=true
app.picpeak.max-password-retries=3
app.picpeak.protection-level=standard
app.picpeak.color-theme=default
app.picpeak.header-style=standard
app.picpeak.hero-divider-style=wave
app.picpeak.hero-image-anchor=center
app.picpeak.css-template-id=1
app.picpeak.source-mode=managed
app.picpeak.klassenfoto-category-id=2
app.picpeak.portrait-category-id=3
app.picpeak.feedback-enabled=true
app.picpeak.allow-ratings=true
app.picpeak.allow-likes=true
app.picpeak.allow-comments=false
app.picpeak.allow-favorites=false
app.picpeak.allow-downloads=false
app.picpeak.disable-right-click=true
app.picpeak.enable-devtools-protection=true
app.picpeak.use-canvas-rendering=true
app.picpeak.watermark-downloads=false
app.picpeak.hero-logo-visible=false
app.picpeak.hero-logo-size=medium
app.picpeak.hero-logo-position=top
app.picpeak.moderate-comments=false
app.picpeak.show-feedback-to-guests=false
