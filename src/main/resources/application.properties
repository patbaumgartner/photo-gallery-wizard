spring.application.name=photo-gallery-wizard
spring.main.web-application-type=none
spring.main.banner-mode=off

# Mode: generate-codes | generate-pdf | (blank = TUI)
app.mode=

# Code generation properties
app.event-code=
app.code-count=17

# CSV / PDF path properties
app.csv-input-path=codes.csv
app.csv-output-path=codes.csv
app.output-path=qr-codes.pdf
app.qr-size=200
app.grid-columns=3
app.grid-rows=4
app.show-cutting-lines=false
app.event-name=

# URL properties
app.base-url=https://my.site
app.gallery-url=https://my.site/gallery?code=

# Back page logo
app.logo-url=

# PDF label properties
app.gallery-code-label=GALERIE CODE
app.gallery-password-label=GALERIE PASSWORT

# PicPeak integration
app.picpeak.enabled=false
app.picpeak.require-password=true
app.picpeak.feedback-enabled=true
app.picpeak.allow-ratings=true
app.picpeak.allow-likes=true
app.picpeak.allow-comments=false
app.picpeak.allow-favorites=false
app.picpeak.allow-downloads=false
app.picpeak.disable-right-click=true
app.picpeak.enable-devtools-protection=true
app.picpeak.use-canvas-rendering=true
app.picpeak.watermark-downloads=false
app.picpeak.hero-logo-visible=false
app.picpeak.moderate-comments=false
app.picpeak.show-feedback-to-guests=false
app.picpeak.header-style=standard
app.picpeak.hero-divider-style=wave
app.picpeak.css-template-id=1
app.picpeak.color-theme=default
app.picpeak.protection-level=standard
app.picpeak.source-mode=managed
app.picpeak.hero-image-anchor=center
app.picpeak.hero-logo-size=medium
app.picpeak.hero-logo-position=top
