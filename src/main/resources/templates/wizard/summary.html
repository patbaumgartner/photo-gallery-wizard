<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Photo Gallery Wizard - Summary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h1 class="h4 mb-0">📷 Photo Gallery Wizard</h1>
                </div>
                <div class="card-body">
                    <div class="mb-4">
                        <div class="progress">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 100%;" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">Complete!</div>
                        </div>
                    </div>
                    <h2 class="h5 mb-3">✅ Summary</h2>
                    <div class="alert alert-success">
                        <p class="mb-1"><strong>Gallery Name:</strong> <span th:text="${galleryName}"></span></p>
                        <p class="mb-1"><strong>Description:</strong> <span th:text="${galleryDescription ?: '—'}"></span></p>
                        <p class="mb-0"><strong>Output Path:</strong> <code th:text="${outputPath}"></code></p>
                    </div>
                    <p class="text-muted">Your gallery configuration has been prepared. Review the settings above and start over if needed.</p>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                        <a href="/wizard/step2" class="btn btn-secondary">← Back</a>
                        <a href="/" class="btn btn-primary">Start Over</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
