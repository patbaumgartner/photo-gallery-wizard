<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Photo Gallery Wizard - Step 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h1 class="h4 mb-0">📷 Photo Gallery Wizard</h1>
                </div>
                <div class="card-body">
                    <div class="mb-4">
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" style="width: 66%;" aria-valuenow="66" aria-valuemin="0" aria-valuemax="100">Step 2 of 3</div>
                        </div>
                    </div>
                    <h2 class="h5 mb-3">Step 2: Output Configuration</h2>
                    <form method="post" th:action="@{/wizard/step2}">
                        <input type="hidden" name="galleryName" th:value="${galleryName}"/>
                        <input type="hidden" name="galleryDescription" th:value="${galleryDescription}"/>
                        <div class="mb-3">
                            <label for="outputPath" class="form-label">Output Directory</label>
                            <input type="text" class="form-control" id="outputPath" name="outputPath" placeholder="gallery-output" th:value="${outputPath ?: ''}"/>
                            <div class="form-text">Directory where gallery files will be generated.</div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                            <a href="/wizard/step1" class="btn btn-secondary">← Back</a>
                            <button type="submit" class="btn btn-primary">Next →</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
