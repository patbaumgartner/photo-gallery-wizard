name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Rename JAR for release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          JAR=$(find target -maxdepth 1 -name "*.jar" -not -name "*.jar.original" | head -1)
          cp "$JAR" "photo-gallery-wizard-${VERSION}.jar"
          echo "JAR=photo-gallery-wizard-${VERSION}.jar" >> "$GITHUB_ENV"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: ${{ env.JAR }}
          retention-days: 1

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary: photo-gallery-wizard
          - os: windows-latest
            platform: windows
            binary: photo-gallery-wizard.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven

      - name: Build native image
        shell: bash
        run: ./mvnw -B package -Pnative -DskipTests

      - name: Prepare release files
        shell: bash
        run: |
          BINARY=$(find target -maxdepth 1 -name "photo-gallery*" -not -name "*.jar" -not -name "*.jar.original" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Native binary not found in target/" >&2
            ls -la target/
            exit 1
          fi
          echo "Found binary: $BINARY"
          mkdir -p staging
          cp "$BINARY" "staging/${{ matrix.binary }}"

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: staging/
          retention-days: 1

  release:
    needs: [ build-jar, build-native ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*

      - name: Create release archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          for dir in release-linux release-windows; do
            platform="${dir#release-}"
            archive="photo-gallery-wizard-${VERSION}-${platform}.zip"
            cd "$dir"
            zip -r "../${archive}" .
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            release-jar/*.jar
          generate_release_notes: true
